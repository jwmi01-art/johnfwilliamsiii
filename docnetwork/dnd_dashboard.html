<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campaign Tracker · AD&D 1e</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Crimson+Pro:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --gold:#C9A84C;--gold-light:#E8C96A;--gold-dim:#7A5E28;--gold-faint:rgba(201,168,76,0.10);
  --surface:#0D0900;--surface2:#181005;--surface3:#201609;--surface4:#2A1E0D;
  --border:rgba(201,168,76,0.15);--border-md:rgba(201,168,76,0.32);--border-strong:rgba(201,168,76,0.58);
  --text:#EDD9A3;--text-dim:rgba(237,217,163,0.52);--text-muted:rgba(237,217,163,0.28);
  --red:#B83232;--red-light:#E05252;--green:#257A48;--green-light:#36B36A;
  --blue:#246090;--purple:#5E2D82;--teal:#1A6E60;
  --luck:#D4A017;--luck-dim:#8B6A0F;--luck-faint:rgba(212,160,23,0.12);
  --font-display:'Cinzel',serif;--font-body:'Crimson Pro',serif;
  --r:6px;--r-lg:10px;
}
html,body{min-height:100vh;background:var(--surface);color:var(--text);font-family:var(--font-body);font-size:15px;line-height:1.5;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 15%,rgba(201,168,76,0.03) 0%,transparent 55%),radial-gradient(ellipse at 85% 85%,rgba(201,168,76,0.025) 0%,transparent 55%);pointer-events:none;z-index:0;}

/* ── NAV ── */
nav{position:sticky;top:0;z-index:100;background:rgba(13,9,0,0.97);border-bottom:1px solid var(--border-md);backdrop-filter:blur(8px);display:flex;align-items:center;padding:0 16px;gap:0;}
.nav-brand{font-family:var(--font-display);font-size:13px;color:var(--gold);letter-spacing:0.18em;padding:13px 0;margin-right:20px;white-space:nowrap;flex-shrink:0;}
.nav-tabs{display:flex;gap:1px;overflow-x:auto;scrollbar-width:none;flex:1;}
.nav-tabs::-webkit-scrollbar{display:none;}
.tab-btn{background:none;border:none;border-bottom:2px solid transparent;color:var(--text-dim);font-family:var(--font-display);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;padding:13px 12px;cursor:pointer;white-space:nowrap;transition:all 0.18s;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);}
.nav-actions{display:flex;gap:8px;margin-left:auto;padding-left:12px;flex-shrink:0;}

/* ── LAYOUT ── */
main{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:20px 14px 60px;}
.tab-panel{display:none;}
.tab-panel.active{display:block;animation:fadeIn 0.18s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

/* ── COMMON ── */
.section-label{font-family:var(--font-display);font-size:10px;text-transform:uppercase;letter-spacing:0.13em;color:var(--gold-dim);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.panel{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;}
.btn{background:none;border:1px solid var(--border-md);color:var(--text-dim);font-family:var(--font-display);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;padding:5px 13px;border-radius:var(--r);cursor:pointer;transition:all 0.15s;}
.btn:hover{color:var(--text);border-color:var(--border-strong);}
.btn-gold{border-color:var(--gold-dim);color:var(--gold);background:var(--gold-faint);}
.btn-gold:hover{background:rgba(201,168,76,0.2);}
.btn-red{border-color:rgba(184,50,50,0.45);color:var(--red-light);background:rgba(184,50,50,0.08);}
.btn-red:hover{background:rgba(184,50,50,0.2);}
.btn-green{border-color:rgba(37,122,72,0.5);color:var(--green-light);background:rgba(37,122,72,0.08);}
.btn-green:hover{background:rgba(37,122,72,0.2);}
.btn-row{display:flex;gap:7px;flex-wrap:wrap;}
.editable{cursor:pointer;}
.editable:hover{color:var(--gold-light);text-decoration:underline dotted rgba(201,168,76,0.4);}
textarea{background:var(--surface3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--font-body);font-size:13px;line-height:1.6;padding:9px 10px;outline:none;resize:vertical;width:100%;transition:border-color 0.15s;}
textarea:focus{border-color:var(--border-md);}
textarea::placeholder{color:var(--text-muted);font-style:italic;}

/* ── LUCK POINTS — the star of the show ── */
.luck-block{background:var(--surface2);border:1px solid rgba(212,160,23,0.4);border-radius:var(--r-lg);padding:14px;position:relative;overflow:hidden;}
.luck-block::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(212,160,23,0.07) 0%,transparent 70%);pointer-events:none;}
.luck-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.luck-title{font-family:var(--font-display);font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--luck-dim);padding-bottom:6px;border-bottom:1px solid rgba(212,160,23,0.2);flex:1;}
.luck-nums{display:flex;align-items:baseline;gap:5px;}
.luck-current{font-family:var(--font-display);font-size:38px;color:var(--luck);line-height:1;cursor:pointer;transition:color 0.15s;}
.luck-current:hover{color:var(--gold-light);}
.luck-current.danger{color:var(--red-light);}
.luck-current.critical{color:var(--red);animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.6;}}
.luck-sep{color:var(--text-muted);font-size:18px;}
.luck-max{font-family:var(--font-display);font-size:18px;color:var(--text-muted);}
.luck-pips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.luck-pip{width:16px;height:16px;border-radius:50%;cursor:pointer;transition:all 0.2s;border:1.5px solid rgba(212,160,23,0.4);background:var(--surface3);}
.luck-pip.spent{background:var(--surface4);border-color:rgba(255,255,255,0.07);}
.luck-pip.avail{background:var(--luck);border-color:var(--luck);box-shadow:0 0 4px rgba(212,160,23,0.4);}
.luck-burn-btn{background:rgba(184,50,50,0.12);border:1px solid rgba(184,50,50,0.4);color:var(--red-light);font-family:var(--font-display);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;padding:4px 12px;border-radius:var(--r);cursor:pointer;transition:all 0.15s;}
.luck-burn-btn:hover{background:rgba(184,50,50,0.22);}
.luck-zero{font-family:var(--font-display);font-size:11px;color:var(--red);letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}

/* DM luck mini display */
.luck-mini{display:flex;align-items:center;gap:6px;margin-top:7px;}
.luck-mini-pips{display:flex;gap:3px;flex-wrap:wrap;}
.luck-mini-pip{width:9px;height:9px;border-radius:50%;border:1px solid rgba(212,160,23,0.35);background:var(--surface3);}
.luck-mini-pip.avail{background:var(--luck);border-color:var(--luck);}
.luck-mini-num{font-family:var(--font-display);font-size:13px;color:var(--luck);}

/* ── DM OVERVIEW ── */
.dm-header{text-align:center;margin-bottom:24px;}
.campaign-name-input{background:none;border:none;color:var(--gold);font-family:var(--font-display);font-size:26px;letter-spacing:0.14em;text-align:center;width:100%;outline:none;margin-bottom:4px;}
.campaign-name-input::placeholder{color:var(--gold-dim);}
.dm-sub{color:var(--text-dim);font-size:14px;font-style:italic;}

.party-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;}
.party-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;transition:border-color 0.2s;}
.party-card:hover{border-color:var(--border-md);}
.party-card.bloodied{border-color:rgba(184,50,50,0.4);}
.party-card.down{border-color:rgba(184,50,50,0.8);background:rgba(184,50,50,0.04);}
.party-card.no-luck{border-color:rgba(212,160,23,0.5);}

.pc-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.pc-avatar{width:40px;height:40px;border-radius:50%;border:1.5px solid;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.pc-name{font-family:var(--font-display);font-size:13px;margin-bottom:1px;}
.pc-meta{font-size:11px;color:var(--text-dim);}
.pc-lvl{margin-left:auto;background:var(--gold-faint);border:1px solid var(--gold-dim);border-radius:20px;padding:2px 9px;font-family:var(--font-display);font-size:10px;color:var(--gold);white-space:nowrap;flex-shrink:0;}

.hp-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.hp-nums{display:flex;align-items:baseline;gap:3px;}
.hp-cur{font-family:var(--font-display);font-size:20px;cursor:pointer;transition:color 0.15s;}
.hp-cur:hover{filter:brightness(1.2);}
.hp-sep{color:var(--text-muted);font-size:12px;}
.hp-max-sm{font-size:12px;color:var(--text-dim);}
.hp-track{flex:1;height:5px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;}
.hp-fill{height:100%;border-radius:3px;transition:width 0.35s,background-color 0.35s;}

.mini-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:7px;}
.mini-stat{background:var(--surface3);border:1px solid var(--border);border-radius:5px;padding:4px 3px;text-align:center;}
.mini-stat-label{font-size:8px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);font-family:var(--font-display);}
.mini-stat-val{font-family:var(--font-display);font-size:14px;color:var(--text);}

.cond-chips{display:flex;flex-wrap:wrap;gap:4px;min-height:16px;}
.cond-chip{padding:2px 7px;border-radius:20px;font-size:10px;font-family:var(--font-display);border:1px solid rgba(184,50,50,0.4);background:rgba(184,50,50,0.1);color:var(--red-light);}
.cond-chip.buff{border-color:rgba(37,122,72,0.4);background:rgba(37,122,72,0.1);color:var(--green-light);}

/* ── CHARACTER SHEET ── */
.sheet-wrap{display:grid;grid-template-columns:275px 1fr;gap:14px;}
.sheet-col{display:flex;flex-direction:column;gap:12px;}

.char-header{background:var(--surface2);border:1px solid var(--border-md);border-radius:var(--r-lg);padding:15px;}
.char-avatar-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.char-avatar-lg{width:56px;height:56px;border-radius:50%;border:2px solid;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.char-name-lg{font-family:var(--font-display);font-size:18px;margin-bottom:2px;}
.char-sub-lg{font-size:12px;color:var(--text-dim);line-height:1.4;}
.char-fields{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.cfield{background:var(--surface3);border:1px solid var(--border);border-radius:5px;padding:5px 8px;}
.cfield-label{font-size:8px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);font-family:var(--font-display);}
.cfield-val{font-size:13px;color:var(--text);cursor:pointer;margin-top:1px;}
.cfield-val:hover{color:var(--gold-light);}

/* Ability scores */
.ab-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.ab-box{background:var(--surface3);border:1px solid var(--border);border-radius:var(--r);padding:9px 5px;text-align:center;}
.ab-name{font-size:8px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);font-family:var(--font-display);}
.ab-score{font-family:var(--font-display);font-size:26px;color:var(--text);line-height:1;cursor:pointer;margin:2px 0;}
.ab-score:hover{color:var(--gold-light);}
.ab-bonus{font-size:10px;color:var(--text-dim);line-height:1.3;}
.ab-exceptional{font-size:11px;color:var(--gold-dim);cursor:pointer;display:block;margin-top:1px;}
.ab-exceptional:hover{color:var(--gold-light);}

/* HP */
.hp-block{background:var(--surface2);border:1px solid var(--border-md);border-radius:var(--r-lg);padding:14px;}
.hp-big-row{display:flex;align-items:baseline;gap:6px;margin-bottom:7px;}
.hp-big{font-family:var(--font-display);font-size:44px;line-height:1;cursor:pointer;}
.hp-big:hover{filter:brightness(1.25);}
.hp-slash{font-size:20px;color:var(--text-muted);}
.hp-total{font-family:var(--font-display);font-size:20px;color:var(--text-dim);cursor:pointer;}
.hp-bar-main{height:5px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;margin-bottom:11px;}
.hp-bar-fill{height:100%;border-radius:3px;transition:width 0.35s,background-color 0.35s;}

/* Combat */
.combat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.stat-box{background:var(--surface3);border:1px solid var(--border);border-radius:var(--r);padding:8px 5px;text-align:center;}
.stat-box-label{font-size:8px;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-muted);font-family:var(--font-display);}
.stat-box-val{font-family:var(--font-display);font-size:20px;color:var(--gold);cursor:pointer;}
.stat-box-val:hover{color:var(--gold-light);}
.stat-box-sub{font-size:9px;color:var(--text-muted);margin-top:1px;}

/* THAC0 table */
.thac0-table{width:100%;border-collapse:collapse;font-size:12px;}
.thac0-table th{font-family:var(--font-display);font-size:9px;letter-spacing:0.05em;color:var(--text-muted);text-transform:uppercase;padding:3px 5px;text-align:center;border-bottom:1px solid var(--border);}
.thac0-table td{padding:3px 5px;text-align:center;color:var(--text-dim);border-bottom:1px solid rgba(255,255,255,0.03);}
.thac0-table td.roll-1{color:var(--red-light);}
.thac0-table td.roll-20{color:var(--gold);}

/* Saves — 1e five categories */
.save-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.03);}
.save-row:last-child{border-bottom:none;}
.save-name{flex:1;font-size:13px;}
.save-target{font-family:var(--font-display);font-size:16px;color:var(--gold);cursor:pointer;min-width:32px;text-align:center;}
.save-target:hover{color:var(--gold-light);}
.save-hint{font-size:10px;color:var(--text-muted);white-space:nowrap;}

/* Weapon Proficiencies */
.wp-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.03);}
.wp-row:last-child{border-bottom:none;}
.wp-name{flex:1;font-size:13px;}
.wp-speed{font-size:11px;color:var(--text-muted);min-width:28px;text-align:center;}
.wp-damage{font-size:12px;color:var(--text-dim);}
.wp-del{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:15px;padding:0 3px;}
.wp-del:hover{color:var(--red-light);}

/* Spell slots */
.slot-row{display:flex;align-items:center;gap:9px;margin-bottom:7px;}
.slot-level-label{font-family:var(--font-display);font-size:10px;color:var(--text-dim);min-width:38px;}
.slot-pips{display:flex;gap:5px;flex-wrap:wrap;}
.slot-pip{width:15px;height:15px;border-radius:50%;cursor:pointer;transition:all 0.15s;border:1.5px solid;}
.slot-pip.avail{background:var(--purple);border-color:#8B5FBF;}
.slot-pip.used{background:var(--surface4);border-color:rgba(255,255,255,0.07);}
.slot-count{font-size:11px;color:var(--text-muted);cursor:pointer;}
.slot-count:hover{color:var(--gold-light);}

/* Conditions */
.cond-toggle{padding:3px 10px;border-radius:20px;font-size:11px;font-family:var(--font-display);cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-dim);transition:all 0.15s;}
.cond-toggle:hover{border-color:var(--border-md);color:var(--text);}
.cond-toggle.on-debuff{background:rgba(184,50,50,0.18);border-color:rgba(184,50,50,0.5);color:var(--red-light);}
.cond-toggle.on-buff{background:rgba(37,122,72,0.18);border-color:rgba(37,122,72,0.5);color:var(--green-light);}

/* Responsive */
@media(max-width:840px){.party-grid{grid-template-columns:repeat(2,1fr);}.sheet-wrap{grid-template-columns:1fr;}}
@media(max-width:520px){.party-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<nav>
  <div class="nav-brand">⚔ AD&D 1e</div>
  <div class="nav-tabs" id="navTabs">
    <button class="tab-btn active" onclick="showTab('dm',this)">DM Overview</button>
  </div>
  <div class="nav-actions">
    <button class="btn btn-gold" id="saveBtn" onclick="saveAll()">Save</button>
    <button class="btn" onclick="exportData()">Export</button>
    <button class="btn" onclick="importData()">Import</button>
  </div>
</nav>

<main>

<!-- ═══ DM OVERVIEW ═══ -->
<div id="tab-dm" class="tab-panel active">
  <div class="dm-header">
    <input class="campaign-name-input" id="campaignName" placeholder="Campaign Name" value="The Temple of Elemental Evil">
    <div class="dm-sub">Dungeon Master's Overview &middot; Advanced Dungeons &amp; Dragons 1st Edition</div>
  </div>

  <div class="party-grid" id="partyGrid"></div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;">
    <div class="panel">
      <div class="section-label">Quick Party Actions</div>
      <div class="btn-row">
        <button class="btn btn-green" onclick="partyFullRest()">Full Rest (Party)</button>
        <button class="btn btn-red" onclick="partyDamage()">Apply Damage (All)</button>
        <button class="btn" onclick="clearAllConditions()">Clear Conditions</button>
      </div>
    </div>
    <div class="panel">
      <div class="section-label">DM Dice Roller</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;">
        <button class="btn btn-gold" onclick="dmRoll(4)">d4</button>
        <button class="btn btn-gold" onclick="dmRoll(6)">d6</button>
        <button class="btn btn-gold" onclick="dmRoll(8)">d8</button>
        <button class="btn btn-gold" onclick="dmRoll(10)">d10</button>
        <button class="btn btn-gold" onclick="dmRoll(12)">d12</button>
        <button class="btn btn-gold" onclick="dmRoll(20)">d20</button>
        <button class="btn btn-gold" onclick="dmRoll(100)">d%</button>
      </div>
      <div id="dmDiceResult" style="font-size:13px;color:var(--text-dim);font-style:italic;min-height:20px;"></div>
    </div>
  </div>

  <div class="panel">
    <div class="section-label">Session Notes</div>
    <textarea id="sessionNotes" style="min-height:200px;" placeholder="Session notes — encounters, treasure, plot threads, NPC details, XP awarded, outstanding quests..."></textarea>
    <div class="btn-row" style="margin-top:8px;">
      <button class="btn btn-gold" onclick="saveAll()">Save Notes</button>
      <button class="btn" onclick="if(confirm('Clear session notes?')){document.getElementById('sessionNotes').value='';state.sessionNotes='';}">Clear</button>
    </div>
  </div>
</div>

<!-- Character tab panels built by JS -->

</main>

<script>
// ══════════════════════════════════════════
//  1e CONSTANTS & TABLES
// ══════════════════════════════════════════

const NUM_CHARS = 6;
const ABILITIES = ['STR','DEX','CON','INT','WIS','CHA'];

// 1e saving throw categories (different from 2e)
const SAVES_1E = [
  {key:'pdm',   label:'Poison & Death Magic'},
  {key:'pps',   label:'Paralysis, Petrification & Poly.'},
  {key:'rsw',   label:'Rod, Staff & Wand'},
  {key:'bw',    label:'Breath Weapon'},
  {key:'spell', label:'Spell'},
];

const CONDITIONS_DEBUFF = ['Blinded','Charmed','Confused','Cursed','Diseased','Exhausted','Frightened','Held','Paralyzed','Petrified','Poisoned','Prone','Silenced','Slowed','Stunned','Unconscious','Webbed'];
const CONDITIONS_BUFF   = ['Blessed','Flying','Hasted','Invisible','Protected','Regenerating'];

const CHAR_EMOJIS = ['⚔','🛡','🔮','🏹','✨','🗡'];
const CHAR_COLORS = ['#C0392B','#2980B9','#8E44AD','#27AE60','#C9A84C','#1A8A7A'];

// ── 1e STR bonus table (PHB p.9)
function strBonus1e(score, exceptional) {
  if (score <= 1)  return {hit:-5, dmg:-4, open:'1', bb:'0%'};
  if (score <= 3)  return {hit:-3, dmg:-1, open:'2', bb:'0%'};
  if (score <= 5)  return {hit:-2, dmg:-1, open:'3', bb:'0%'};
  if (score <= 7)  return {hit:-1, dmg:0,  open:'4', bb:'0%'};
  if (score <= 9)  return {hit:0,  dmg:0,  open:'5', bb:'1%'};
  if (score <= 11) return {hit:0,  dmg:0,  open:'6', bb:'2%'};
  if (score <= 12) return {hit:0,  dmg:0,  open:'7', bb:'4%'};
  if (score <= 13) return {hit:0,  dmg:0,  open:'8', bb:'4%'};
  if (score <= 14) return {hit:0,  dmg:0,  open:'9', bb:'7%'};
  if (score <= 15) return {hit:0,  dmg:0,  open:'10',bb:'7%'};
  if (score <= 16) return {hit:0,  dmg:1,  open:'11',bb:'10%'};
  if (score === 17) return {hit:1, dmg:1,  open:'12',bb:'13%'};
  if (score === 18) {
    const e = exceptional || 0;
    if (e === 0)   return {hit:1,  dmg:2,  open:'13/14',bb:'16%'};
    if (e <= 50)   return {hit:1,  dmg:3,  open:'15/16',bb:'20%'};
    if (e <= 75)   return {hit:2,  dmg:3,  open:'16/17',bb:'25%'};
    if (e <= 90)   return {hit:2,  dmg:4,  open:'17/18',bb:'30%'};
    if (e <= 99)   return {hit:2,  dmg:5,  open:'18/19',bb:'35%'};
    return               {hit:3,  dmg:6,  open:'19/20',bb:'40%'};
  }
  if (score === 19) return {hit:3,  dmg:7,  open:'19/20',bb:'50%'};
  if (score === 20) return {hit:3,  dmg:8,  open:'19/20',bb:'60%'};
  return                   {hit:4,  dmg:11, open:'19/20',bb:'70%'};
}

// 1e DEX adjustments (PHB p.11)
function dexBonus1e(score) {
  if (score <= 1)  return {reaction:-6, missile:-6, defense:5};
  if (score <= 3)  return {reaction:-3, missile:-3, defense:4};
  if (score <= 5)  return {reaction:-1, missile:-1, defense:3};
  if (score <= 6)  return {reaction:0,  missile:0,  defense:2};
  if (score <= 8)  return {reaction:0,  missile:0,  defense:1};
  if (score <= 14) return {reaction:0,  missile:0,  defense:0};
  if (score === 15) return {reaction:0, missile:0,  defense:-1};
  if (score === 16) return {reaction:1, missile:1,  defense:-2};
  if (score === 17) return {reaction:2, missile:2,  defense:-3};
  if (score === 18) return {reaction:2, missile:2,  defense:-4};
  return                   {reaction:3, missile:3,  defense:-6};
}

// 1e CON bonuses
function conBonus1e(score) {
  if (score <= 1)  return {hp:-3, sys:25, rez:30};
  if (score <= 2)  return {hp:-2, sys:30, rez:35};
  if (score <= 3)  return {hp:-2, sys:35, rez:40};
  if (score <= 6)  return {hp:-1, sys:40, rez:45};
  if (score <= 8)  return {hp:0,  sys:55, rez:60};
  if (score <= 14) return {hp:0,  sys:65, rez:70};
  if (score === 15) return {hp:1, sys:70, rez:75};
  if (score === 16) return {hp:2, sys:75, rez:80};
  if (score === 17) return {hp:3, sys:80, rez:85};
  if (score === 18) return {hp:4, sys:85, rez:90};
  if (score === 19) return {hp:5, sys:90, rez:95};
  return                   {hp:6, sys:95, rez:100};
}

function abilityBonusText(ab, score, exceptional) {
  if (ab==='STR') {
    const b = strBonus1e(score, exceptional);
    return `Hit ${pStr(b.hit)} / Dmg ${pStr(b.dmg)}\nOpen Doors: ${b.open} / BB/LG: ${b.bb}`;
  }
  if (ab==='DEX') {
    const b = dexBonus1e(score);
    return `React ${pStr(b.reaction)} / Missile ${pStr(b.missile)}\nDefense ${b.defense <= 0 ? b.defense : '+'+b.defense} to AC`;
  }
  if (ab==='CON') {
    const b = conBonus1e(score);
    return `HP ${pStr(b.hp)} / Sys Shock ${b.sys}%\nRez Survival: ${b.rez}%`;
  }
  if (ab==='INT') {
    const langs = score<=7?0:score<=9?1:score<=11?2:score<=13?3:score<=15?4:score<=17?5:7;
    const maxSpell = score<=8?'—':score<=9?'4th':score<=11?'5th':score<=12?'6th':score<=14?'7th':score<=16?'8th':'9th';
    return `Max Spell Lvl: ${maxSpell}\nBonus Lang: ${langs}`;
  }
  if (ab==='WIS') {
    const magDef = score<=5?'-2':score<=7?'-1':score<=12?'+0':score<=13?'+1':score<=14?'+2':score<=15?'+3':score<=16?'+4':'+6';
    return `Magic Defense Adj: ${magDef}`;
  }
  if (ab==='CHA') {
    const maxH = score<=1?0:score<=2?1:score<=3?2:score<=5?3:score<=7?4:score<=9?5:score<=11?4:score<=12?5:score<=13?6:score<=15?7:score<=16?8:score<=17?10:score<=18?15:20;
    const react = score<=1?'-7':score<=2?'-6':score<=3?'-5':score<=5?'-4':score<=7?'-2':score<=8?'-1':score<=12?'0':score<=13?'+1':score<=14?'+2':score<=15?'+3':score<=16?'+4':score<=17?'+5':'+7';
    return `Max Hench: ${maxH} / Reaction: ${react}`;
  }
  return '';
}

function pStr(n){ return (n>=0?'+':'')+n; }
function hpColor(cur,max){ if(max<=0||cur<=0) return '#555'; const p=cur/max; return p<=0.25?'#B83232':p<=0.5?'#C97020':'#257A48'; }
function roll(sides){ return Math.floor(Math.random()*sides)+1; }

let state = {
  campaignName: 'The Temple of Elemental Evil',
  chars: Array.from({length:NUM_CHARS}, (_,i) => defaultChar(i)),
  sessionNotes: '',
};

function loadState() {
  const saved = localStorage.getItem('adnd1e_campaign');
  if (saved) {
    try {
      const p = JSON.parse(saved);
      state = {...state, ...p};
      state.chars = state.chars.map((c,i) => ({...defaultChar(i), ...c}));
    } catch(e) {}
  } else {
    state.chars = EXAMPLE_PARTY.map((c,i) => ({...defaultChar(i), ...c}));
  }
  document.getElementById('campaignName').value = state.campaignName;
  document.getElementById('sessionNotes').value = state.sessionNotes || '';
}

function saveAll() {
  state.campaignName = document.getElementById('campaignName').value;
  state.sessionNotes = document.getElementById('sessionNotes').value;
  state.chars.forEach((c,i) => {
    ['notes','equipment','features'].forEach(f => {
      const el = document.getElementById(f+'_'+i);
      if (el) c[f] = el.value;
    });
  });
  localStorage.setItem('adnd1e_campaign', JSON.stringify(state));
  const btn = document.getElementById('saveBtn');
  const orig = btn.textContent; btn.textContent = 'Saved ✓';
  setTimeout(() => btn.textContent = orig, 1500);
}

function exportData() {
  state.campaignName = document.getElementById('campaignName').value;
  state.sessionNotes = document.getElementById('sessionNotes').value;
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (state.campaignName||'campaign').replace(/\s+/g,'_') + '_adnd1e.json';
  a.click();
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const imp = JSON.parse(ev.target.result);
        state = {...state, ...imp};
        state.chars = state.chars.map((c,i) => ({...defaultChar(i), ...c}));
        document.getElementById('campaignName').value = state.campaignName;
        document.getElementById('sessionNotes').value = state.sessionNotes||'';
        renderAll();
        alert('Campaign imported.');
      } catch(e) { alert('Invalid save file.'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function buildTabs() {
  const tabs = document.getElementById('navTabs');
  tabs.querySelectorAll('.char-tab').forEach(t => t.remove());
  state.chars.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn char-tab';
    btn.textContent = c.name;
    btn.onclick = () => showTab('char'+i, btn);
    tabs.appendChild(btn);
    if (!document.getElementById('tab-char'+i)) {
      const panel = document.createElement('div');
      panel.id = 'tab-char'+i;
      panel.className = 'tab-panel';
      document.querySelector('main').appendChild(panel);
    }
  });
}

function showTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const panel = document.getElementById('tab-'+id);
  if (panel) panel.classList.add('active');
  if (btn) btn.classList.add('active');
}

          <div class="pc-name" style="color:${c.color}">${c.name}</div>

        <div class="hp-nums">
          <span class="hp-cur editable" style="color:${hpCol}" onclick="quickHP(${i})">${c.hpCurrent}</span>

          <span class="hp-max-sm">${c.hpMax}</span>
        </div>
        <div class="hp-track"><div class="hp-fill" style="width:${pct}%;background:${hpCol}"></div></div>
      </div>

        ${luckWarning}

}

function quickHP(i) {
  const c = state.chars[i];
  const val = prompt(`${c.name} — HP:\n+N heal  |  -N damage  |  exact number`, c.hpCurrent);
  if (val === null) return;
  const v = val.trim();
  if (v.startsWith('+')) c.hpCurrent = Math.min(c.hpMax, c.hpCurrent + parseInt(v.slice(1)));
  else if (v.startsWith('-')) c.hpCurrent = Math.max(-10, c.hpCurrent - parseInt(v.slice(1)));
  else c.hpCurrent = Math.max(-10, Math.min(c.hpMax, parseInt(v)));
  renderAll();
}

function spendLuck(i) {
  const c = state.chars[i];
  if (c.luckCurrent <= 0) { alert(`${c.name} has no luck points remaining.`); return; }
  const amt = parseInt(prompt(`Spend luck points for ${c.name}.\nCurrent: ${c.luckCurrent}/${c.luckMax}\nHow many to spend?`, '1'));
  if (isNaN(amt) || amt < 1) return;
  if (amt > c.luckCurrent) { alert(`${c.name} only has ${c.luckCurrent} luck point${c.luckCurrent!==1?'s':''}.`); return; }
  if (!confirm(`Permanently spend ${amt} luck point${amt!==1?'s':''} for ${c.name}?\nThis cannot be undone.`)) return;
  c.luckCurrent = Math.max(0, c.luckCurrent - amt);
  c.luckMax = Math.max(0, c.luckMax - amt);
  renderAll();
}

  // Spell slots
  const ordinals = ['','1st','2nd','3rd','4th','5th','6th','7th','8th','9th'];
  const slotHtml = Object.keys(c.spellSlots).length
    ? Object.entries(c.spellSlots).map(([lvl, slots]) => `

        <span class="slot-count editable" onclick="editSlotCount(${i},${lvl})">${slots.length} slot${slots.length!==1?'s':''}</span>
      </div>`).join('')
    : `<div style="color:var(--text-muted);font-size:13px;font-style:italic;margin-bottom:6px;">No spells. Click + Level to add.</div>`;

  // Conditions
  const condHtml = [...CONDITIONS_BUFF, ...CONDITIONS_DEBUFF].map(cd => {
    const on = c.conditions.includes(cd);
    const isB = CONDITIONS_BUFF.includes(cd);
    const cls = on ? (isB ? 'on-buff' : 'on-debuff') : '';
    return `<button class="cond-toggle ${cls}" onclick="toggleCondition(${i},'${cd}')">${cd}</button>`;
  }).join('');

  // Luck display
  const luckDanger = c.luckCurrent <= 0;
  const luckLow = c.luckCurrent <= 2 && c.luckCurrent > 0;
  const luckCls = luckDanger ? 'luck-current danger critical' : luckLow ? 'luck-current danger' : 'luck-current';
  const luckPips = Array.from({length: c.luckMax}, (_, j) =>
    `<div class="luck-pip ${j < c.luckCurrent ? 'avail' : 'spent'}" onclick="toggleLuckPip(${i},${j})" title="${j < c.luckCurrent ? 'Click to spend 1 luck' : 'Spent — permanent'}"></div>`
  ).join('');

  // THAC0 table — AC 10 to -5 in one row
  const thac0Cells = Array.from({length:16}, (_,j) => {
    const ac = 10-j;
    const needed = Math.max(1, Math.min(20, c.thac0-ac));
    const cls = needed===1?'roll-1':needed>=20?'roll-20':'';
    return `<td class="${cls}">${needed}</td>`;
  }).join('');

  panel.innerHTML = `<div class="sheet-wrap">

  <!-- ── LEFT COLUMN ── -->
  <div class="sheet-col">

    <div class="char-header">
      <div class="char-avatar-row">
        <div class="char-avatar-lg" style="border-color:${c.color}70">${c.emoji}</div>
        <div>
          <div class="char-name-lg editable" style="color:${c.color}" onclick="editStr(${i},'name','${c.name}')">${c.name}</div>
          <div class="char-sub-lg">${c.race} ${c.charClass} · Level ${c.level}</div>
        </div>
      </div>
      <div class="char-fields">
        <div class="cfield"><div class="cfield-label">Race</div><div class="cfield-val editable" onclick="editStr(${i},'race','${c.race}')">${c.race}</div></div>
        <div class="cfield"><div class="cfield-label">Class</div><div class="cfield-val editable" onclick="editStr(${i},'charClass','${c.charClass}')">${c.charClass}</div></div>
        <div class="cfield"><div class="cfield-label">Level</div><div class="cfield-val editable" onclick="editNum(${i},'level',${c.level})">${c.level}</div></div>
        <div class="cfield"><div class="cfield-label">XP</div><div class="cfield-val editable" onclick="editNum(${i},'xp',${c.xp})">${c.xp.toLocaleString()}</div></div>
        <div class="cfield"><div class="cfield-label">Alignment</div><div class="cfield-val editable" onclick="editStr(${i},'alignment','${c.alignment}')">${c.alignment}</div></div>
        <div class="cfield"><div class="cfield-label">Move Rate</div><div class="cfield-val editable" onclick="editNum(${i},'movRate',${c.movRate})">${c.movRate}"</div></div>
      </div>
    </div>

    <div class="panel">
      <div class="section-label">Ability Scores</div>
      <div class="ab-grid">${abHtml}</div>
    </div>

    <div class="panel">
      <div class="section-label">Saving Throws <span style="float:right;color:var(--text-muted);font-size:10px;font-weight:normal;letter-spacing:normal;text-transform:none;">Roll equal or above target</span></div>
      ${savesHtml}
    </div>

    <div class="panel">
      <div class="section-label">Weapon Proficiencies
        <button onclick="addWP(${i})" style="float:right;background:none;border:1px solid var(--border);border-radius:4px;color:var(--text-dim);font-size:10px;padding:1px 8px;cursor:pointer;font-family:var(--font-display);">+ Add</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr auto auto auto;gap:6px;font-size:9px;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-muted);font-family:var(--font-display);margin-bottom:4px;">
        <span>Weapon</span><span>Speed</span><span>Dmg S-M / L</span><span></span>
      </div>
      ${wpHtml}
    </div>

  </div>

  <!-- ── RIGHT COLUMN ── -->
  <div class="sheet-col">

    <!-- LUCK POINTS — prominent placement -->
    <div class="luck-block">
      <div class="luck-title">☽ Luck Points — Permanent Resource</div>
      <div style="display:flex;align-items:flex-start;gap:16px;margin-bottom:10px;">
        <div>
          <div class="luck-nums">
            <span class="${luckCls}" onclick="editNum(${i},'luckCurrent',${c.luckCurrent})">${c.luckCurrent}</span>
            <span class="luck-sep">/</span>
            <span class="luck-max">${c.luckMax}</span>
          </div>
          ${luckDanger ? '<div class="luck-zero">No luck remaining</div>' : ''}
          ${luckLow ? `<div style="font-family:var(--font-display);font-size:11px;color:var(--red-light);margin-top:2px;">Running low!</div>` : ''}
        </div>
        <div style="flex:1">
          <div style="font-size:12px;color:var(--text-dim);font-style:italic;line-height:1.5;margin-bottom:8px;">Luck points are <strong style="color:var(--text);">permanent</strong> — once spent, they're gone. Spend to avoid a critical failure or certain death.</div>
          <div class="luck-pips">${luckPips}</div>
        </div>
      </div>
      <div class="btn-row">
        <button class="luck-burn-btn" onclick="burnLuck(${i},1)">Spend 1</button>
        <button class="luck-burn-btn" onclick="burnLuck(${i},2)">Spend 2</button>
        <button class="luck-burn-btn" onclick="burnLuck(${i},3)">Spend 3</button>
        <button onclick="editNum(${i},'luckMax',${c.luckMax})" class="btn" style="margin-left:auto;">Set Max</button>
      </div>
    </div>

    <div class="hp-block panel">
      <div class="section-label">Hit Points</div>
      <div class="hp-big-row">
        <span class="hp-big editable" style="color:${hpCol}" onclick="editNum(${i},'hpCurrent',${c.hpCurrent})">${c.hpCurrent}</span>
        <span class="hp-slash">/</span>
        <span class="hp-total editable" onclick="editNum(${i},'hpMax',${c.hpMax})">${c.hpMax}</span>
        ${c.hpCurrent<=-1&&c.hpCurrent>=-9 ? `<span style="margin-left:10px;font-size:13px;color:var(--red-light);font-style:italic;">Unconscious — dying</span>` : ''}
        ${c.hpCurrent<=-10 ? `<span style="margin-left:10px;font-size:13px;color:var(--red);font-style:italic;">Dead</span>` : ''}
      </div>
      <div class="hp-bar-main"><div class="hp-bar-fill" style="width:${hpPct}%;background:${hpCol}"></div></div>
      <div class="btn-row">
        <button class="btn btn-red" onclick="adjustHP(${i},-1)">− Damage</button>
        <button class="btn btn-green" onclick="adjustHP(${i},1)">+ Heal</button>
        <button class="btn btn-gold" onclick="fullRest(${i})">Full Rest</button>
      </div>
    </div>

    <div class="panel">
      <div class="section-label">Combat</div>
      <div class="combat-grid">
        <div class="stat-box"><div class="stat-box-label">Armor Class</div><div class="stat-box-val editable" onclick="editNum(${i},'ac',${c.ac})">${c.ac}</div><div class="stat-box-sub">lower = better</div></div>
        <div class="stat-box"><div class="stat-box-label">THAC0</div><div class="stat-box-val editable" onclick="editNum(${i},'thac0',${c.thac0})">${c.thac0}</div><div class="stat-box-sub">lower = better</div></div>
        <div class="stat-box"><div class="stat-box-label">Move Rate</div><div class="stat-box-val editable" onclick="editNum(${i},'movRate',${c.movRate})">${c.movRate}"</div><div class="stat-box-sub">per round</div></div>
      </div>
    </div>

    <div class="panel">
      <div class="section-label">THAC0 Hit Table — Roll Needed to Hit AC:</div>
      <div style="overflow-x:auto;">
        <table class="thac0-table">
          <thead><tr>${Array.from({length:16},(_,j)=>`<th>${10-j}</th>`).join('')}</tr></thead>
          <tbody><tr>${thac0Cells}</tr></tbody>
        </table>
      </div>
    </div>

    <div class="panel">
      <div class="section-label">Spell Slots
        <button onclick="addSpellLevel(${i})" style="float:right;background:none;border:1px solid var(--border);border-radius:4px;color:var(--text-dim);font-size:10px;padding:1px 8px;cursor:pointer;font-family:var(--font-display);">+ Level</button>
      </div>
      ${slotHtml}
      ${Object.keys(c.spellSlots).length ? `<div class="btn-row" style="margin-top:8px;"><button class="btn btn-gold" onclick="fullRest(${i})">Memorize (Rest)</button></div>` : ''}
    </div>

    <div class="panel">
      <div class="section-label">Conditions & Status</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;">${condHtml}</div>
    </div>

    <div class="panel">
      <div class="section-label">Weapons & Equipment</div>
      <textarea id="equipment_${i}" style="min-height:80px;" placeholder="Weapons, armor, gear, gold pieces, encumbrance..." onblur="state.chars[${i}].equipment=this.value">${c.equipment||''}</textarea>
    </div>

    <div class="panel">
      <div class="section-label">Class Abilities & Special Powers</div>
      <textarea id="features_${i}" style="min-height:90px;" placeholder="Class features, racial abilities, thief skills, special powers..." onblur="state.chars[${i}].features=this.value">${c.features||''}</textarea>
    </div>

    <div class="panel">
      <div class="section-label">Notes</div>
      <textarea id="notes_${i}" style="min-height:80px;" placeholder="Personal notes, contacts, rumours, quest items..." onblur="state.chars[${i}].notes=this.value">${c.notes||''}</textarea>
    </div>

  </div>
</div>`;
}

// ══════════════════════════════════════════
//  ACTIONS
// ══════════════════════════════════════════

function editStr(i, field, current) {
  const val = prompt(`Edit ${field}:`, current);
  if (val === null) return;
  state.chars[i][field] = val;
  renderAll();
}

function editNum(i, field, current) {
  const val = prompt(`Edit ${field}:`, current);
  if (val === null) return;
  const parts = field.split('.');
  const num = parseFloat(val) || 0;
  if (parts.length === 2) state.chars[i][parts[0]][parts[1]] = num;
  else state.chars[i][field] = num;
  renderAll();
}

function adjustHP(i, dir) {
  const val = prompt(dir > 0 ? 'Heal amount:' : 'Damage amount:');
  if (!val) return;
  const amt = parseInt(val); if (isNaN(amt)) return;
  const c = state.chars[i];
  c.hpCurrent = Math.max(-10, Math.min(c.hpMax, c.hpCurrent + dir * amt));
  renderAll();
}

function fullRest(i) {
  const c = state.chars[i];
  c.hpCurrent = c.hpMax;
  Object.keys(c.spellSlots).forEach(lvl => {
    c.spellSlots[lvl] = c.spellSlots[lvl].map(() => true);
  });
  renderAll();
}

// Luck — burns permanently
function burnLuck(i, amt) {
  const c = state.chars[i];
  if (c.luckCurrent < amt) {
    alert(`${c.name} only has ${c.luckCurrent} luck point${c.luckCurrent!==1?'s':''} remaining.`);
    return;
  }
  if (!confirm(`Permanently spend ${amt} luck point${amt!==1?'s':''} for ${c.name}?\n\nThis permanently reduces their maximum luck. There is no recovery.`)) return;
  c.luckCurrent = Math.max(0, c.luckCurrent - amt);
  c.luckMax = Math.max(0, c.luckMax - amt);
  renderAll();
}

function toggleLuckPip(i, pipIdx) {
  const c = state.chars[i];
  if (pipIdx >= c.luckCurrent) {
    alert('This luck point is already spent — luck is permanent. It cannot be restored.');
    return;
  }
  const toSpend = c.luckCurrent - pipIdx;
  if (!confirm(`Permanently spend ${toSpend} luck point${toSpend!==1?'s':''} for ${c.name}? This cannot be undone.`)) return;
  c.luckCurrent = pipIdx;
  c.luckMax = pipIdx;
  renderAll();
}

function toggleSlot(i, lvl, si) {
  state.chars[i].spellSlots[lvl][si] = !state.chars[i].spellSlots[lvl][si];
  renderSheet(i);
}

function editSlotCount(i, lvl) {
  const c = state.chars[i];
  const val = prompt(`Spell level ${lvl} — number of slots:`, c.spellSlots[lvl].length);
  if (!val) return;
  const n = Math.max(0, parseInt(val) || 0);
  const existing = c.spellSlots[lvl];
  c.spellSlots[lvl] = Array.from({length:n}, (_,j) => j < existing.length ? existing[j] : true);
  renderSheet(i);
}

function addSpellLevel(i) {
  const c = state.chars[i];
  const existing = Object.keys(c.spellSlots).map(Number);
  let next = 1;
  while (existing.includes(next) && next <= 9) next++;
  if (next > 9) { alert('All spell levels already added.'); return; }
  const n = parseInt(prompt(`How many level ${next} spell slots?`, '2') || '2');
  if (!n || n < 1) return;
  c.spellSlots[next] = Array(n).fill(true);
  renderSheet(i);
}

function addWP(i) {
  const name = prompt('Weapon name:'); if (!name) return;
  const speed = parseInt(prompt('Speed factor:', '5') || '5');
  const damage = prompt('Damage (S-M / L):', '1d8/1d12');
  state.chars[i].weaponProfs.push({name, speed, damage: damage||'1d8/1d12'});
  renderSheet(i);
}

function editWP(i, wi, field, current) {
  const val = prompt(`Edit ${field}:`, current);
  if (val === null) return;
  if (field === 'speed') state.chars[i].weaponProfs[wi][field] = parseInt(val)||0;
  else state.chars[i].weaponProfs[wi][field] = val;
  renderSheet(i);
}

function removeWP(i, wi) {
  if (!confirm('Remove this weapon proficiency?')) return;
  state.chars[i].weaponProfs.splice(wi, 1);
  renderSheet(i);
}

function toggleCondition(i, cond) {
  const c = state.chars[i];
  const idx = c.conditions.indexOf(cond);
  if (idx >= 0) c.conditions.splice(idx, 1);
  else c.conditions.push(cond);
  renderSheet(i);
  renderPartyGrid();
}

// ── DM Quick Actions
function partyFullRest() {
  if (!confirm('Full rest for the entire party? HP and spell slots restored.')) return;
  state.chars.forEach((_, i) => fullRest(i));
}
function partyDamage() {
  const amt = parseInt(prompt('Damage applied to entire party:'));
  if (isNaN(amt) || amt < 1) return;
  state.chars.forEach(c => { c.hpCurrent = Math.max(-10, c.hpCurrent - amt); });
  renderAll();
}
function clearAllConditions() {
  if (!confirm('Clear all conditions for all characters?')) return;
  state.chars.forEach(c => { c.conditions = []; });
  renderAll();
}

function dmRoll(sides) {
  const r = roll(sides);
  const el = document.getElementById('dmDiceResult');
  if (!el) return;
  const nat20 = r === 20 && sides === 20;
  const nat1  = r === 1  && sides === 20;
  el.innerHTML = `<span style="font-family:var(--font-display);font-size:11px;color:var(--gold-dim);">d${sides} →</span>
    <span style="font-family:var(--font-display);font-size:20px;margin-left:8px;color:${nat20?'var(--gold-light)':nat1?'var(--red-light)':'var(--text)'};">
      ${r}${nat20?' — Natural 20!':nat1?' — Fumble':''}
    </span>`;
}

// ══════════════════════════════════════════
//  RENDER ALL
// ══════════════════════════════════════════

function renderAll() {
  renderPartyGrid();
  for (let i = 0; i < NUM_CHARS; i++) renderSheet(i);
  document.querySelectorAll('.char-tab').forEach((btn, i) => {
    if (state.chars[i]) btn.textContent = state.chars[i].name;
  });
}

// ══════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════

loadState();
buildTabs();
renderAll();

document.getElementById('campaignName').addEventListener('input', e => {
  document.title = e.target.value + ' · AD&D 1e';
  state.campaignName = e.target.value;
});

setInterval(saveAll, 120000);
</script>
</body>
</html>
